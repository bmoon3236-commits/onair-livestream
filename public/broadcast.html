<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diffuser — OnAir</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <a href="/" class="brand display" style="text-decoration:none"><span class="tally"></span> OnAir</a>
  <nav>
    <div class="userchip hidden" id="userChip"></div>
    <button class="btn btn-ghost" id="loginBtn">Connexion</button>
  </nav>
</div>

<div class="container">
  <div id="setupPanel">
    <h1 class="display">Démarrer un live</h1>
    <p style="color:var(--muted)">Ta webcam sera diffusée en direct dès que tu cliques sur "Passer en direct".</p>
    <input class="title-input" id="titleInput" placeholder="Titre de ton live" maxlength="80">
    <button class="btn btn-primary" id="startBtn">Passer en direct</button>
    <div class="small-note" id="setupError" style="color:var(--signal)"></div>
  </div>

  <div id="livePanel" class="hidden">
    <div class="stage-layout">
      <div>
        <div class="video-wrap">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="onair-badge"><span class="dot"></span> ON AIR</div>
          <div class="timer-badge" id="timerBadge">00:00</div>
          <div class="viewer-count-badge" id="viewerCountBadge">0 spectateur</div>
          <div class="reaction-layer" id="reactionLayer"></div>
        </div>
        <div class="controls-row">
          <button class="btn btn-primary" id="endBtn">Terminer le live</button>
        </div>
      </div>

      <div class="side-panel">
        <div class="head">Chat en direct</div>
        <div class="chat-log" id="chatLog"></div>
        <form class="chat-form" id="chatForm">
          <input id="chatInput" placeholder="Écrire un message..." maxlength="300" autocomplete="off">
          <button class="btn btn-primary" type="submit">Envoyer</button>
        </form>
      </div>
    </div>
  </div>

  <div id="endedPanel" class="hidden ended-banner">
    <h2 class="display">Live terminé</h2>
    <p>Merci d'avoir diffusé.</p>
    <a href="/" class="btn btn-primary">Retour à l'accueil</a>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/broadcast.js"></script>
</body>
</html>
